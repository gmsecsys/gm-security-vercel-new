<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GM Security - Online Document</title>
  <style>
    @page{size:A4;margin:0}
    :root{--dark:#3f3f3f;--muted:#777;--line:#e8e8e8;--soft:#f6f6f6;--red:#d9302c}
    body{margin:0;background:#f3f4f6;color:#111;font-family:Arial,Helvetica,sans-serif}
    .viewer-bar{position:sticky;top:0;z-index:5;background:#272727;color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px;box-shadow:0 2px 10px rgba(0,0,0,.15)}
    .viewer-bar b{font-size:15px}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:0;border-radius:9px;padding:10px 13px;cursor:pointer;background:#fff;color:#222;font-weight:700}.btn.red{background:var(--red);color:#fff}
    .wrap{padding:24px 10px}.a4-doc{width:210mm;min-height:297mm;background:#fff;color:#111;margin:0 auto;padding:13mm 14mm;box-sizing:border-box;font-size:12.5px;box-shadow:0 12px 34px rgba(0,0,0,.12)}
    .doc-top{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:22px}.doc-title-wrap{text-align:right}.doc-title{font-size:42px;letter-spacing:2px;font-weight:500;margin-bottom:20px}.doc-company{line-height:1.35;font-size:13px}.doc-info-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:24px;border-top:1px solid #ddd;border-bottom:1px solid #eee;padding:16px 0;margin-bottom:18px}.doc-label{font-size:12px;color:#888;letter-spacing:1px;margin-bottom:4px}.doc-bill{line-height:1.45}.doc-meta p{display:flex;justify-content:space-between;gap:16px;margin:4px 0}.doc-meta .grand{background:#f0f0f0;padding:6px 8px;font-size:14px}.doc-table{width:100%;border-collapse:collapse;margin-top:8px}.doc-table th{background:#3f3f3f;color:#fff;font-size:12px;text-align:left;padding:10px;border-bottom:0}.doc-table td{color:#111;padding:10px;border-bottom:1px solid #eee;vertical-align:top}.doc-table .num{text-align:right;white-space:nowrap}.part-col{width:120px;color:#555}.doc-summary{display:grid;grid-template-columns:1fr 330px;gap:20px;margin-top:18px;border-top:4px solid #eee;padding-top:14px}.doc-summary p{display:flex;justify-content:space-between;margin:7px 0}.doc-notes{margin-top:18px;line-height:1.5;border-top:1px solid #eee;padding-top:12px}.doc-footer{text-align:center;color:#888;margin-top:18mm}.receipt-box{border:1px solid #ddd;background:#fafafa;padding:16px;line-height:1.8;margin:20px 0}.error{max-width:720px;margin:50px auto;background:#fff;padding:24px;border-radius:12px;border:1px solid #ddd}.watermark{margin-top:14px;color:#888;font-size:11px;text-align:center}.doc-share{display:none}
    @media(max-width:800px){.wrap{padding:0}.a4-doc{width:100%;min-height:100vh;box-shadow:none;padding:18px}.doc-top,.doc-info-grid,.doc-summary{grid-template-columns:1fr}.doc-title-wrap{text-align:left}.doc-title{font-size:34px}.viewer-bar{align-items:flex-start;flex-direction:column}}
    @media print{body{background:#fff}.viewer-bar{display:none}.wrap{padding:0}.a4-doc{box-shadow:none;margin:0}.watermark{display:none}}
  </style>
</head>
<body>
  <div class="viewer-bar"><b>GM Security Systems · Online Document</b><div class="actions"><button class="btn" onclick="window.print()">Print / Save PDF</button><button class="btn red" onclick="copyLink()">Copy Link</button></div></div>
  <div class="wrap"><div id="doc"></div></div>
  <script>
    const money = n => '$' + Number(n || 0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
    const esc = s => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    function decodePayload(){
      const raw = (location.hash.match(/data=([^&]+)/)||[])[1];
      if(!raw) throw new Error('No document data found in this link.');
      let b64 = raw.replace(/-/g,'+').replace(/_/g,'/');
      while(b64.length % 4) b64 += '=';
      return JSON.parse(decodeURIComponent(escape(atob(b64))));
    }
    function companyBlock(c={}){return `<div class="doc-company"><b>${esc(c.name||'GM Security Systems')}</b><br>${esc(c.legal||'Ets. Georges E. Mazraani')}<br>${esc(c.location||'Lebanon')}<br><br>${esc(c.phone||'+961 70 339779')}<br>${esc(c.email||'info@gmsecuritysrv.com')}</div>`}
    function clientName(c, fallback){return c?.businessName || c?.companyName || c?.name || [c?.firstName,c?.lastName].filter(Boolean).join(' ') || fallback || ''}
    function clientBlock(c={}, fallback=''){ const name=clientName(c,fallback); return `<div class="doc-bill"><div class="doc-label">BILL TO</div><b>${esc(name)}</b><br>${c.accountNo?`Account: ${esc(c.accountNo)}<br>`:''}${c.location?`${esc(c.location)}<br>`:''}Lebanon<br><br>${esc(c.phone||'')}${c.email?`<br>${esc(c.email)}`:''}</div>` }
    function renderDoc(p){
      const type=p.type, d=p.doc||{}, c=p.company||{}, client=p.client||{};
      const isQ=type==='quote', isI=type==='invoice', isR=type==='receipt';
      const title=isQ?'QUOTATION':isI?'INVOICE':'RECEIPT';
      const dateLabel=isQ?'Estimate Date':isI?'Invoice Date':'Receipt Date';
      const numberLabel=isQ?'Estimate Number':isI?'Invoice Number':'Receipt Number';
      const dueLabel=isQ?'Valid Until':isI?'Due Date':'Invoice Ref';
      const dueValue=isQ?(d.validUntil||''):isI?(d.due||''):(d.invoiceId||'Manual');
      const rate=Number(d.exchangeRate||client.exchangeRate||89500).toLocaleString();
      const total=Number(d.total||d.amount||0), paid=Number(d.paid||d.amount||0), balance=Number(d.balance||0);
      const rows=(d.items||[]).map(i=>`<tr><td class="part-col">${esc(i.partNo||'')}</td><td>${esc(i.description||i.name||'')}</td><td class="num">${esc(i.qty||'')}</td><td class="num">${money(i.price||0)}</td><td class="num">${money(Number(i.qty||0)*Number(i.price||0))}</td></tr>`).join('');
      const receiptDetails=isR?`<div class="receipt-box"><b>Payment Method:</b> ${esc(d.method||'')}<br><b>Amount Paid:</b> ${money(d.amount||0)}<br><b>Remaining Balance:</b> ${money(d.balance||0)}</div>`:'';
      return `<div class="a4-doc"><div class="doc-top"><div></div><div class="doc-title-wrap"><div class="doc-title">${title}</div>${companyBlock(c)}</div></div><div class="doc-info-grid">${clientBlock(client,d.client)}<div class="doc-meta"><p><b>${numberLabel}:</b> ${esc(d.id||'')}</p><p><b>${dateLabel}:</b> ${esc(d.date||'')}</p><p><b>${dueLabel}:</b> ${esc(dueValue)}</p><p><b>Currency:</b> ${esc(d.currency||'USD')}</p><p><b>Exchange Rate:</b> 1 USD = ${rate} LBP</p><p class="grand"><b>Grand Total (USD):</b> ${money(total)}</p>${isI?`<p><b>Paid:</b> ${money(paid)}</p><p><b>Balance Due:</b> ${money(balance)}</p>`:''}</div></div>${rows?`<table class="doc-table"><thead><tr><th>Item #</th><th>Description</th><th>Quantity</th><th>Price</th><th>Amount</th></tr></thead><tbody>${rows}</tbody></table>`:receiptDetails}<div class="doc-summary"><div></div><div><p><b>Grand Total (USD):</b> ${money(total)}</p>${isR?`<p><b>Amount Paid:</b> ${money(d.amount||0)}</p><p><b>Remaining Balance:</b> ${money(d.balance||0)}</p>`:''}</div></div>${(d.notes||d.terms)?`<div class="doc-notes"><b>Notes:</b><br>${esc(d.notes||d.terms)}</div>`:''}<div class="doc-notes"><b>Terms & Conditions:</b><br>${isQ?'This quotation is valid until the date mentioned above. ':''}Prices are in USD unless otherwise stated. Exchange rate is shown for LBP reference.</div><div class="doc-footer">${esc(c.email||'info@gmsecuritysrv.com')}</div><div class="watermark">Online copy generated from GM Security Pro v17 · ${esc(p.generatedAt||'')}</div></div>`;
    }
    function renderStatement(p){
      const s=p.statement||{}, c=p.company||{}, client=p.client||{};
      const invRows=(s.invoices||[]).map(i=>`<tr><td>${esc(i.id)}</td><td>${esc(i.date)}</td><td>${esc(i.due||'')}</td><td>${esc(i.status)}</td><td class="num">${money(i.total)}</td><td class="num">${money(i.balance)}</td></tr>`).join('');
      const recRows=(s.receipts||[]).map(r=>`<tr><td>${esc(r.id)}</td><td>${esc(r.date)}</td><td>${esc(r.invoiceId||'Manual')}</td><td>${esc(r.method||'')}</td><td class="num">${money(r.amount)}</td></tr>`).join('');
      return `<div class="a4-doc"><div class="doc-top"><div></div><div class="doc-title-wrap"><div class="doc-title">STATEMENT</div>${companyBlock(c)}</div></div><div class="doc-info-grid">${clientBlock(client,s.client)}<div class="doc-meta"><p><b>Statement Date:</b> ${esc(s.date||'')}</p><p><b>Currency:</b> ${esc(s.currency||'USD')}</p><p><b>Exchange Rate:</b> 1 USD = ${Number(s.rate||89500).toLocaleString()} LBP</p><p class="grand"><b>Balance Due:</b> ${money(s.balance)}</p></div></div><div class="doc-summary"><div></div><div><p><b>Total Invoiced:</b> ${money(s.total)}</p><p><b>Total Paid:</b> ${money(s.paid)}</p><p><b>Balance Due:</b> ${money(s.balance)}</p></div></div><h3>Invoices</h3><table class="doc-table"><thead><tr><th>Invoice</th><th>Date</th><th>Due</th><th>Status</th><th>Total</th><th>Balance</th></tr></thead><tbody>${invRows}</tbody></table><h3>Receipts</h3><table class="doc-table"><thead><tr><th>Receipt</th><th>Date</th><th>Invoice</th><th>Method</th><th>Paid USD</th></tr></thead><tbody>${recRows}</tbody></table><div class="doc-footer">${esc(c.email||'info@gmsecuritysrv.com')}</div><div class="watermark">Online copy generated from GM Security Pro v17 · ${esc(p.generatedAt||'')}</div></div>`
    }
    function copyLink(){navigator.clipboard?.writeText(location.href).then(()=>alert('Link copied')).catch(()=>prompt('Copy link:',location.href))}
    try{ const p=decodePayload(); document.getElementById('doc').innerHTML = p.type==='statement' ? renderStatement(p) : renderDoc(p); document.title = 'GM Security - ' + (p.doc?.id || p.statement?.client || 'Document'); }catch(e){ document.getElementById('doc').innerHTML=`<div class="error"><h2>Cannot open document</h2><p>${esc(e.message)}</p><p>Please ask GM Security Systems to send a fresh link.</p></div>`; }
  </script>
</body>
</html>
